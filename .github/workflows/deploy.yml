name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Pull the repository contents onto the GitHub-hosted runner.
      - uses: actions/checkout@v4

      # Install Node.js so the React/Vite frontend can be built.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      # Install Python for the producer test environment.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # Install JDK 21 for the Spring Boot consumer build.
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # Install uv so the producer dependencies and pytest environment can be created from pyproject metadata.
      - name: Install uv
        run: python -m pip install uv

      # Restore frontend dependencies from the lockfile and produce a production build.
      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: ./frontend

      # Create the producer virtual environment, install runtime and dev dependencies, and run the pytest suite.
      - name: Test producer
        run: |
          uv sync --frozen --group dev
          uv run pytest tests -v
        working-directory: ./producer

      # Run the Spring Boot test suite before packaging the consumer jar.
      - name: Test consumer
        run: ./mvnw test
        working-directory: ./consumer

      # Package the consumer application jar after the tests have already passed.
      - name: Build consumer
        run: ./mvnw package -DskipTests
        working-directory: ./consumer

      # Ensure the Compose file still resolves cleanly before deploy runs.
      - name: Validate Docker Compose
        run: docker compose config

      # Build the frontend, consumer, and producer container images in CI to catch Dockerfile or runtime-environment issues early.
      - name: Validate Docker images
        run: docker compose build frontend consumer producer

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      # Pull the latest repository contents onto the self-hosted deployment runner.
      - uses: actions/checkout@v4

      # Rebuild and start the Compose services on the target machine, then print container status.
      - name: Deploy stack
        run: |
          docker compose up -d --build
          docker compose ps
